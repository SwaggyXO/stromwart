services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: stromwart
      POSTGRES_USER: stromwart
      POSTGRES_PASSWORD: stromwart
    # Host port 5434 avoids conflict when a local PostgreSQL service already binds 5432.
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stromwart -d stromwart"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-test:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: stromwart_test
      POSTGRES_USER: stromwart
      POSTGRES_PASSWORD: stromwart
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stromwart -d stromwart_test"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"